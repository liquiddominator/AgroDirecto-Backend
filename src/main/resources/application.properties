spring.application.name=AgroDirecto

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agro_directo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:agrodirecto}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:agrodirecto}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:agro_directo}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=${DB_SCHEMA:agro_directo}
spring.flyway.default-schema=${DB_SCHEMA:agro_directo}
spring.flyway.create-schemas=true

security.jwt.secret=${JWT_SECRET:agrodirecto-dev-secret-change-in-production-2026}
security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
security.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:30}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.verification.upload-dir=${APP_VERIFICATION_UPLOAD_DIR:storage/verification-documents}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

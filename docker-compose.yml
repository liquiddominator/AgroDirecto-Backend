services:
  db:
    image: postgres:17-alpine
    container_name: agrodirecto-db
    environment:
      POSTGRES_DB: agro_directo
      POSTGRES_USER: agrodirecto
      POSTGRES_PASSWORD: agrodirecto
      TZ: America/La_Paz
    ports:
      - "5432:5432"
    volumes:
      - agrodirecto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrodirecto -d agro_directo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrodirecto-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/agro_directo
      SPRING_DATASOURCE_USERNAME: agrodirecto
      SPRING_DATASOURCE_PASSWORD: agrodirecto
      DB_SCHEMA: agro_directo
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agrodirecto_pgdata:
